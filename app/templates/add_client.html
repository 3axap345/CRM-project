{% extends "base.html" %}
{% block title %}New client{% endblock %}

{% block content %}
<div class="page-header">
    <h1>New client</h1>
    <a href="{{ url_for('main.clients') }}" class="btn btn-outline-secondary">
        <i class="bi bi-arrow-left me-1"></i> Back
    </a>
</div>

<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card">
            <div class="card-header">Client details</div>
            <div class="card-body">
                <form method="POST">
                    <input type="hidden" name="csrf_token" value="{{ session.get('_csrf_token','') }}">

                    <div class="mb-3">
                        <label class="form-label">Имя <span style="color:#f43f5e">*</span></label>
                        <input type="text" name="name" class="form-control"
                               placeholder="John Doe" required autofocus>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Phone</label>
                        <input type="text" name="phone" class="form-control"
                               placeholder="+1 555 000 0000">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control"
                               placeholder="client@example.com">
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Status</label>
                        <select name="status" class="form-select">
                            <option value="new">🟢 New</option>
                            <option value="in_progress">🟡 In progress</option>
                            <option value="closed">⚪ Closed</option>
                        </select>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary flex-fill">
                            <i class="bi bi-check-lg me-1"></i> Save
                        </button>
                        <a href="{{ url_for('main.clients') }}" class="btn btn-outline-secondary">
                            Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
